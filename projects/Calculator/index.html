<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Calculator JS</title>
		<link rel="stylesheet" href="./style.css" />
	</head>
	<body>
	

		<div class="calculator">
			<div class="display">
				<div class="previous-number">
					<p></p>
					<span class="math-sign"></span>
				</div>
				<p class="current-number"></p>
			</div>
	
		<div class="panel">
			<button class="clear color-btn">AC</button>
			<button class="operator color-btn">2^</button>
			<button class="operator color-btn">:</button>
			<button class="operator color-btn">x</button>
			<button class="number">7</button>
			<button class="number">8</button>
			<button class="number">9</button>
			<button class="operator color-btn">-</button>
			<button class="number">4</button>
			<button class="number">5</button>
			<button class="number">6</button>
			<button class="operator color-btn">+</button>
			<button class="number">1</button>
			<button class="number">2</button>
			<button class="number">3</button>
			<button class="equals color-btn">=</button>
			<button class="number">0</button>
			<button class="number">00</button>
			<button class="number color-btn">.</button>
		</div>
	</div>
		<div data-simplebar class="calculator-history">
			<p class="history-title">Last Calculations:<button class="history-btn">Delete History</button> </p>
			<hr>
	
			<ul class="history">
	
			</ul>
		</div>
	

		<script src="./style.js"></script>
	</body>
</html>
